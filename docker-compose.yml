services:
  postgres:
    image: postgres:16-alpine
    container_name: zava-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zava
      POSTGRES_PASSWORD: zava
      POSTGRES_DB: zava
    ports:
      - "5432:5432"
    volumes:
      - zava-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zava"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  zava-postgres-data:
